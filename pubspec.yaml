name: zamry_wallet
description: "Zamry's non-custodial wallet for fiat and crypto"
  
publish_to: 'none'
# The following defines the version and build number for your application using this format:version: 1.0.0-test+1
version: 1.0.0+1
environment:
  sdk: ^3.8.0


dependencies:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dart_mappable: ^4.6.0
  device_info_plus: ^11.5.0
  dio: ^5.9.0
  firebase_analytics: ^12.0.0
  firebase_core: ^4.0.0
  firebase_crashlytics: ^5.0.0
  firebase_remote_config: ^6.0.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_env_native: ^0.2.0
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  get_it: ^8.2.0
  go_router: ^16.2.0
  http_parser: ^4.1.2
  injectable: ^2.5.1
  intl: ^0.20.2
  logging: ^1.3.0
  mime: ^2.0.0
  package_info_plus: ^8.3.1
  pretty_dio_logger: ^1.4.0
  provider: ^6.1.5+1
  riverpod: ^2.6.1
  share_plus: ^11.1.0
  shimmer: ^3.0.0
dev_dependencies:
  build_runner: ^2.7.0
  dart_mappable_builder: ^4.6.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.6
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.8.1
flutter:
  uses-material-design: true
  generate: true
  # To add assets to your application
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # To add custom fonts to your application
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700

# Set the launcher icon for your app
# You can use the following command to generate the launcher icon:
# flutter pub run flutter_launcher_icons:main
flutter_launcher_icons:
  image_path: "assets/images/launcher_icon.png"
  android: true
  ios: true
  web:
    generate: false
  windows:
    generate: false
    icon_size: 48
  macos:
    generate: false

# Set the splash screen for your app
# You can use the following command to generate the splash screen:
# flutter pub run flutter_native_splash:create
flutter_native_splash:
  color: "#ffffff"
  image: assets/images/splash.png
  android: true
  ios: true 

